name: Build OBhoD_BLOK APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018" "platforms;android-35" "build-tools;35.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install gomobile & build native libs
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          chmod +x scripts/build-go-lib.sh scripts/build-native-libs.sh
          bash scripts/build-native-libs.sh

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug -x buildNativeLibs --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OBhoD_BLOK-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
